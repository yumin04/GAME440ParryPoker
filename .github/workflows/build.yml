name: Build
on:
  push:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/build.yml'

jobs:
  build-windows:
    name: Windows Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-windows-
            
      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
            targetPlatform: StandaloneWindows64
            unityVersion: 'auto'
        
      - name: UploadArtifact
        uses: actions/upload-artifact@v6
        with: 
            name: Parry-Poker-Windows
            path: build/StandaloneWindows64
            retention-days: 90
            
  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-macos-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-macos-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneOSX
          unityVersion: 'auto'

      - name: UploadArtifact
        uses: actions/upload-artifact@v6
        with:
          name: Parry-Poker-macOS
          path: build/StandaloneOSX
          retention-days: 90
      release:
    name: Release Build
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Parry-Poker-Windows
          path: windows-build

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: Parry-Poker-macOS
          path: macos-build

      - name: Zip Builds
        run: |
          zip -r Parry-Poker-Windows.zip windows-build
          zip -r Parry-Poker-macOS.zip macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Build v${{ github.run_number }}
          files: |
            Parry-Poker-Windows.zip
            Parry-Poker-macOS.zip
